{% extends "base.html" %}
{% block title %}輸入回測參數{% endblock %}

{% block content %}
  <h3>設定回測參數</h3>
  <p class="muted">策略 A：投資組合</p>
  <p class="muted">策略 B：台股加權指數</p>

  <form method="POST" action="{{ url_for('backtest') }}">
    <label>投資組合（輸入多檔股票代號，請用半形逗號和空格隔開）</label>
    <input type="text" name="symbols" placeholder="例如：2330.TW, 2412.TW, 2881.TW" required />

    <label>                                    </label>
    <div class="grid">
      <div>
        <label>每月投入週次</label>
        <select name="invest_week">
          <option value="1">第 1 週 (1~7日)</option>
          <option value="2">第 2 週 (8~14日)</option>
          <option value="3">第 3 週 (15~21日)</option>
          <option value="4">第 4 週 (22日以後)</option>
        </select>
      </div>

      <div>
        <label>投入時機</label>
        <select name="invest_day_type">
          <option value="first">該週「第一個」營業日</option>
          <option value="last">該週「最後一個」營業日</option>
        </select>
      </div>
    </div>

    <label>每月投資金額</label>
    <input type="number" name="monthly_invest" placeholder="例如 1000" required min="0" step="0.01" />

    <button type="submit">開始回測 2018 - 現在</button>
  </form>

{% endblock %}
